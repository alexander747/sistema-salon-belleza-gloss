version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: posfinal-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-posfinal123}
      MYSQL_DATABASE: salon_saas
      MYSQL_USER: posfinal
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-posfinal}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    command:
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  n8n:
    image: n8nio/n8n:latest
    container_name: posfinal-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      N8N_PORT: 5678
      N8N_METRICS: "false"
      N8N_PERSONALIZATION_ENABLED: "false"
      GENERIC_TIMEZONE: "America/Argentina/Buenos_Aires"
      N8N_DEFAULT_LOCALE: "es"
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  mysql_data:
  n8n_data:
